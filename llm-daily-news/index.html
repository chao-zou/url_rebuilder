<style>

    background:linear-gradient(180deg,#fff6ea,var(--bg) 240px);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}

  .badge{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;

  h1{font-size:36px;font-weight:800;letter-spacing:-.02em;margin:16px 0 6px;
    background:linear-gradient(92deg,var(--accent),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--sub);font-size:15px}
  .stat{display:flex;gap:22px;margin-top:20px;flex-wrap:wrap}
  .stat div{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 18px;box-shadow:var(--shadow)}
  .stat b{display:block;font-size:22px;font-weight:800;color:var(--accent)}
  .stat span{font-size:12.5px;color:var(--sub)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:30px}
  .rcard{position:relative;display:block;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:22px 22px 20px;box-shadow:var(--shadow);text-decoration:none;color:inherit;
    transition:.2s;overflow:hidden;cursor:pointer}
  .rcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c,var(--gold))}
  .rcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-h);border-color:var(--c,var(--gold))}
  .type-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:4px 11px;border-radius:999px;margin-bottom:12px}
  .type-morning{background:#fff0df;color:#c96a11}
  .type-evening{background:#e9ecff;color:#4a58c4}
  .rcard h3{font-size:19px;font-weight:800;margin-bottom:6px}
  .rcard .rdate{font-size:13px;color:var(--sub);font-family:var(--mono)}
  .rcard .rdesc{font-size:13.5px;color:#4a5058;margin-top:10px;min-height:38px}
  .rcard .go{margin-top:14px;font-size:13px;font-weight:700;color:var(--c,var(--accent));display:flex;align-items:center;gap:6px}
  .empty{margin-top:40px;text-align:center;color:var(--sub);background:#fff;border:1px dashed var(--line);border-radius:16px;padding:50px}
  footer{margin-top:56px;text-align:center;color:var(--sub);font-size:13px;border-top:1px solid var(--line);padding-top:26px}
  @media(max-width:600px){h1{font-size:28px}.wrap{padding:0 14px 60px}}

function typeOf(file){
  if(/^morning[_-]/i.test(file)) return {key:'morning', label:'☀️ 晨报', cls:'type-morning', color:'var(--gold)'};
  if(/^(evening|night)[_-]/i.test(file)) return {key:'evening', label:'🌙 夜报', cls:'type-evening', color:'var(--moon)'};
  return {key:'morning', label:'📄 日报', cls:'type-morning', color:'var(--gold)'};
}

let nM=0, nE=0;
const grid=document.getElementById('grid');
grid.innerHTML = sorted.map(r=>{
  const t=typeOf(r.file);
  if(t.key==='morning') nM++; else nE++;
  return `<a class="rcard" href="./${r.file}" style="--c:${t.color}">
    <span class="type-badge ${t.cls}">${t.label}</span>
    <h3>${r.title}</h3>

    <div class="rdesc">${r.desc||''}</div>
    <div class="go">阅读全文 →</div>

}).join('');

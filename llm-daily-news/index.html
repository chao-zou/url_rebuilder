<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 大模型晨报 / 夜报 · 历史总目录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0a0e1f;--bg1:#111834;--card:rgba(24,32,64,.72);--card-brd:rgba(120,140,220,.18);
  --ink:#e8ecf8;--ink-dim:#a4adcf;--ink-mute:#6f78a0;--moon:#c7b8ff;--accent:#7c6cff;--accent2:#4dd6ff;--gold:#ffcf6b;--orange:#ff9d5c;
  --grad:linear-gradient(120deg,#7c6cff 0%,#4dd6ff 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Inter',system-ui,sans-serif;color:var(--ink);line-height:1.7;min-height:100vh;
  background:radial-gradient(1200px 600px at 12% -8%,rgba(124,108,255,.18),transparent 60%),radial-gradient(1000px 500px at 92% 4%,rgba(77,214,255,.12),transparent 55%),linear-gradient(180deg,var(--bg0),var(--bg1) 45%,var(--bg0));background-attachment:fixed;}
.wrap{max-width:1000px;margin:0 auto;padding:0 22px 90px}
.hero{text-align:center;padding:60px 0 30px}
.hero .tag{display:inline-block;padding:7px 18px;border-radius:999px;background:rgba(124,108,255,.14);border:1px solid rgba(199,184,255,.35);color:var(--moon);font-weight:700;font-size:13.5px;margin-bottom:20px}
.hero h1{font-size:clamp(30px,5.5vw,48px);font-weight:900;background:linear-gradient(120deg,#fff,#c7b8ff 55%,#4dd6ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.hero p{color:var(--ink-dim);font-size:15.5px;max-width:640px;margin:0 auto}
.filters{display:flex;justify-content:center;gap:10px;margin:28px 0 8px;flex-wrap:wrap}
.fbtn{cursor:pointer;font-size:14px;font-weight:600;padding:8px 20px;border-radius:999px;border:1px solid var(--card-brd);background:rgba(124,108,255,.1);color:var(--ink-dim);transition:.2s}
.fbtn:hover{color:var(--ink);border-color:var(--accent)}
.fbtn.active{background:var(--grad);color:#fff;border-color:transparent}
.stat-line{text-align:center;color:var(--ink-mute);font-size:13.5px;margin-bottom:26px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.card{position:relative;display:block;background:var(--card);border:1px solid var(--card-brd);border-radius:18px;padding:22px 22px;text-decoration:none;color:inherit;backdrop-filter:blur(12px);transition:.26s;overflow:hidden;cursor:pointer}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;opacity:.9}
.card.morning::before{background:linear-gradient(180deg,#ffcf6b,#ff9d5c)}
.card.night::before{background:var(--grad)}
.card:hover{transform:translateY(-5px);border-color:rgba(124,108,255,.55);box-shadow:0 20px 46px -20px rgba(80,70,200,.65)}
.card:hover .go{color:var(--accent2)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.type-badge{font-size:12.5px;font-weight:700;padding:4px 12px;border-radius:999px}
.type-badge.morning{background:rgba(255,207,107,.14);color:var(--gold);border:1px solid rgba(255,207,107,.4)}
.type-badge.night{background:rgba(124,108,255,.16);color:var(--moon);border:1px solid rgba(124,108,255,.45)}
.weekday{font-size:12.5px;color:var(--ink-mute)}
.card h3{font-size:20px;font-weight:800;margin-bottom:6px;color:#fff}
.card .sub{font-size:13.5px;color:var(--ink-dim);margin-bottom:14px}
.card .go{font-size:13.5px;color:var(--ink-mute);font-weight:600;transition:.2s}
.empty{grid-column:1/-1;text-align:center;color:var(--ink-mute);padding:40px}
.foot{text-align:center;color:var(--ink-mute);font-size:13px;margin-top:56px;padding-top:24px;border-top:1px solid var(--card-brd)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="tag">📚 大模型晨报 / 夜报</div>
    <h1>历史总目录</h1>
    <p>每日追踪 AI / 大模型全域资讯。晨报速览、夜报深度复盘，覆盖论文、模型趋势、公有云用量、社区实践、播客洞察与行业思辨。</p>
    <div class="filters">
      <span class="fbtn active" data-f="all">全部</span>
      <span class="fbtn" data-f="night">🌙 夜报</span>
      <span class="fbtn" data-f="morning">☀️ 晨报</span>
    </div>
    <div class="stat-line" id="statLine"></div>
  </header>
  <main class="grid" id="grid"></main>
  <footer class="foot">🌙 大模型晨报 / 夜报 · 自动生成 · 最近更新 2026-07-06</footer>
</div>
<script>
/* 报告清单：newest first。type 自动决定徽章（morning=晨报 / night=夜报）。 */
const REPORTS=[
  {type:"night",date:"2026-07-06",file:"night_2026-07-06.html"},
  {type:"morning",date:"2026-07-06",file:"morning_2026-07-06.html"},
  {type:"night",date:"2026-07-05",file:"night_2026-07-05.html"},
  {type:"morning",date:"2026-07-05",file:"morning_2026-07-05.html"},
  {type:"night",date:"2026-07-04",file:"night_2026-07-04.html"},
  {type:"morning",date:"2026-07-04",file:"morning_2026-07-04.html"},
  {type:"night",date:"2026-07-03",file:"night_2026-07-03.html"},
  {type:"morning",date:"2026-07-03",file:"morning_2026-07-03.html"},
  {type:"night",date:"2026-07-02",file:"night_2026-07-02.html"},
  {type:"morning",date:"2026-07-02",file:"morning_2026-07-02.html"},
  {type:"night",date:"2026-07-01",file:"night_2026-07-01.html"},
  {type:"morning",date:"2026-07-01",file:"morning_2026-07-01.html"},
  {type:"night",date:"2026-06-30",file:"night_2026-06-30.html"},
  {type:"morning",date:"2026-06-30",file:"morning_2026-06-30.html"},
  {type:"night",date:"2026-06-29",file:"night_2026-06-29.html"}
];
const WD=['周日','周一','周二','周三','周四','周五','周六'];
function weekday(d){const t=new Date(d+'T12:00:00');return WD[t.getDay()];}
const grid=document.getElementById('grid');
const statLine=document.getElementById('statLine');
let filter='all';
function render(){
  grid.innerHTML='';
  const list=REPORTS.filter(r=>filter==='all'||r.type===filter);
  if(!list.length){grid.innerHTML='<div class="empty">暂无该类型报告</div>';}
  list.forEach(r=>{
    const isNight=r.type==='night';
    const a=document.createElement('a');
    a.className='card '+r.type;a.href=r.file;
    a.innerHTML=`
      <div class="card-top">
        <span class="type-badge ${r.type}">${isNight?'🌙 夜报':'☀️ 晨报'}</span>
        <span class="weekday">${weekday(r.date)}</span>
      </div>
      <h3>${r.date}</h3>
      <div class="sub">${isNight?'深度复盘 · 播客洞察 · 产品方法论 · 技术深度':'当日 AI / 大模型资讯速览'}</div>
      <div class="go">阅读全文 →</div>`;
    grid.appendChild(a);
  });
  const n=REPORTS.filter(r=>r.type==='night').length,m=REPORTS.filter(r=>r.type==='morning').length;
  statLine.textContent=`共 ${REPORTS.length} 期 · 🌙 夜报 ${n} 期 · ☀️ 晨报 ${m} 期`;
}
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');filter=b.dataset.f;render();
}));
render();
</script>
</body>
</html>

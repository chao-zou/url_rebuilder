<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安踏企业解决方案 · 周报 | 邹超</title>
<!--
  ============================================================================
  安踏企业解决方案周报 · 可编辑 HTML（数据与展示分离 + 多周历史 + 左侧导航 + 图片 lightbox）
  ----------------------------------------------------------------------------
  架构：内容存于同目录 data.json；http/https 下读取 data.json，
        本地 file:// 双击打开时回退到页内嵌 DEFAULT_DATA（与 data.json 同步）。
  周定义：自然周（周一至周日），跨月不截断，日期显示如 06/29 - 07/05。
  历史：data.weeks 为周数组（最新在前）；左侧导航可切换查看、可折叠。
  字段归属：每个可编辑字段含 source（ai/manual）；人工保存后变 manual，
            AI 更新只覆盖 source=ai 字段，不动 manual 字段。
  渲染扩展：支持飞书原生 HTML <table> / <font> 直通；图片 ![alt](path)
            渲染为缩略图，点击弹出 lightbox 大图。
  ============================================================================
-->
<style>
  :root{
    --anta-red:#c8102e; --anta-red-dark:#9b0c23;
    --ink:#1d2129; --ink-2:#4e5969; --ink-3:#86909c;
    --line:#e5e6eb; --bg:#f5f6f8; --card:#fff; --accent-soft:#fdecef;
    --blue:#1664ff; --green:#00a870; --orange:#ff7d00;
    --edit:#ff9a2e; --edit-bg:#fff8ef;
    --side:236px; --sidebar-bg:#1f2329;
    --radius:14px; --shadow:0 2px 16px rgba(29,33,41,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;font-size:15px}
  a{color:var(--blue);text-decoration:none;transition:color .15s}
  a:hover{color:var(--anta-red);text-decoration:underline}
  .wrap{max-width:980px;margin:0 auto;padding:0 24px}

  /* ===== 左侧历史导航 ===== */
  #sidebar{position:fixed;top:0;left:0;height:100vh;width:var(--side);background:var(--sidebar-bg);color:#e6e8eb;z-index:60;display:flex;flex-direction:column;transition:transform .25s ease;box-shadow:2px 0 12px rgba(0,0,0,.12)}
  body.nav-collapsed #sidebar{transform:translateX(calc(var(--side) * -1))}
  .side-head{padding:18px 18px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08)}
  .side-head .logo{background:var(--anta-red);color:#fff;font-weight:800;font-size:12px;font-style:italic;padding:3px 8px;border-radius:6px;letter-spacing:1px}
  .side-head .ttl{font-size:14px;font-weight:700;color:#fff}
  .side-sub{padding:10px 18px 6px;font-size:11.5px;color:#8a9099;letter-spacing:.5px}
  .side-list{flex:1;overflow-y:auto;padding:4px 10px 18px}
  .side-item{display:block;padding:10px 12px;border-radius:9px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:.15s;user-select:none}
  .side-item:hover{background:rgba(255,255,255,.06)}
  .side-item.active{background:rgba(200,16,46,.18);border-color:rgba(200,16,46,.55)}
  .side-item .si-range{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;pointer-events:none}
  .side-item .si-label{font-size:11.5px;color:#9aa0a8;margin-top:2px;pointer-events:none}
  .side-item.active .si-label{color:#d7b0b6}
  .si-cur{font-size:10px;font-weight:700;background:var(--anta-red);color:#fff;padding:1px 7px;border-radius:10px}
  .si-todo{font-size:10px;color:#8a9099;border:1px solid #3a3f47;padding:0 6px;border-radius:9px;margin-left:auto}
  .side-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#7a8089}

  /* 折叠按钮 */
  #navToggle{position:fixed;top:14px;left:calc(var(--side) + 14px);z-index:61;background:#fff;border:1px solid var(--line);border-radius:9px;width:38px;height:38px;cursor:pointer;font-size:16px;box-shadow:var(--shadow);transition:left .25s ease;display:flex;align-items:center;justify-content:center}
  body.nav-collapsed #navToggle{left:14px}

  /* ===== 主区域 ===== */
  .page{margin-left:var(--side);transition:margin-left .25s ease}
  body.nav-collapsed .page{margin-left:0}

  .topbar{background:linear-gradient(120deg,#1a1c20 0%,#2b2f36 60%,var(--anta-red-dark) 130%);color:#fff;padding:26px 0 22px;position:relative;overflow:hidden}
  .topbar::after{content:"ANTA";position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:110px;font-weight:900;letter-spacing:6px;color:rgba(255,255,255,.05);font-style:italic}
  .brand-tag{display:inline-flex;align-items:center;gap:8px;background:var(--anta-red);color:#fff;font-size:12px;font-weight:700;letter-spacing:1px;padding:4px 12px;border-radius:20px;margin-bottom:12px;margin-left:46px}
  .topbar h1{font-size:24px;font-weight:800;margin-left:46px}
  .active-week-title{margin:6px 0 0 46px;font-size:16px;font-weight:700;color:#fff;letter-spacing:.2px;transition:opacity .2s ease,transform .2s ease}
  .active-week-title.updating{opacity:.35;transform:translateY(4px)}
  .topbar .meta{margin:10px 0 0 46px;display:flex;flex-wrap:wrap;gap:8px 22px;font-size:13px;color:rgba(255,255,255,.82)}
  .topbar .meta b{color:#fff;font-weight:600}

  .toolbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .toolbar-inner{max-width:980px;margin:0 auto;padding:9px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .toolbar .hint{font-size:13px;color:var(--ink-3)}
  .toolbar .spacer{flex:1}
  .tbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s}
  .tbtn:hover{border-color:var(--anta-red);color:var(--anta-red)}
  .tbtn.primary{background:var(--anta-red);border-color:var(--anta-red);color:#fff}
  .tbtn.primary:hover{background:var(--anta-red-dark);color:#fff}

  main{padding:24px 0 60px}

  details.bg{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
  details.bg>summary{cursor:pointer;list-style:none;padding:15px 24px;font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:10px}
  details.bg>summary::-webkit-details-marker{display:none}
  details.bg>summary::before{content:"📌"}
  details.bg>summary .arrow{margin-left:auto;color:var(--ink-3);transition:transform .2s}
  details.bg[open]>summary .arrow{transform:rotate(180deg)}
  .bg-body{padding:6px 24px 20px;border-top:1px solid var(--line)}
  .doc-chips{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .doc-link{display:inline-flex;align-items:center;gap:5px;background:#f3f7ff;border:1px solid #dbe7ff;color:var(--blue);font-size:12.5px;padding:3px 10px;border-radius:6px;width:fit-content}
  .doc-link:hover{background:#e6f0ff;text-decoration:none}
  .doc-link::before{content:"🔗";font-size:11px}
  .lab{font-size:12px;color:var(--ink-3);font-weight:600;margin:14px 0 4px}

  .week{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 28px;margin-bottom:22px;transition:opacity .24s ease,transform .24s ease;will-change:opacity,transform}
  .week.switching{opacity:0;transform:translateY(10px)}
  .week-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding-bottom:14px;border-bottom:2px solid var(--anta-red)}
  .week-head .range{font-size:21px;font-weight:800}
  .week-head .label{font-size:13px;color:var(--ink-3);font-weight:500}
  .week-head .full{font-size:12px;color:var(--ink-3)}
  .week-head .badge{margin-left:auto;background:var(--accent-soft);color:var(--anta-red);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
  .week-head .badge.hist{background:#eef0f2;color:var(--ink-2)}
  .week-note{font-size:12.5px;color:var(--ink-3);background:#fafafa;border-left:3px solid var(--line);padding:7px 12px;border-radius:0 6px 6px 0;margin:14px 0 4px}

  .module{padding:18px 16px;border:1px solid transparent;border-radius:12px;margin:6px -16px;transition:background .15s,border-color .15s;border-bottom:1px dashed var(--line)}
  .module:last-child{border-bottom:1px solid transparent}
  .module.editing{background:var(--edit-bg);border:1px solid var(--edit);box-shadow:0 0 0 3px rgba(255,154,46,.12)}
  .module-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .module-title{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700}
  .module-title .num{display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:7px;background:var(--anta-red);color:#fff;font-size:13px;font-weight:700;flex:none}
  .src-badge{font-size:11px;font-weight:700;padding:1px 8px;border-radius:5px}
  .src-badge.ai{background:#eaf1ff;color:var(--blue)}
  .src-badge.manual{background:#eef0f2;color:var(--ink-2)}
  .module-head .btn-edit{margin-left:auto}
  .btn-edit{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s}
  .btn-edit:hover{border-color:var(--anta-red);color:var(--anta-red)}
  .module-hint{font-size:12px;color:var(--ink-3);background:#fafafa;border-left:3px solid var(--line);padding:5px 11px;border-radius:0 6px 6px 0;margin-bottom:12px}
  .todo-flag{display:inline-block;font-size:12px;color:var(--orange);background:#fff3e8;border:1px dashed #ffc98f;border-radius:6px;padding:3px 10px}

  .md h3{font-size:15.5px;font-weight:700;margin:14px 0 6px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .md h3::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--anta-red);display:inline-block}
  .md h4{font-size:14.5px;font-weight:700;margin:10px 0 4px}
  .md p{margin:8px 0}
  .md em{color:var(--ink-3);font-style:normal}
  .md ul,.md ol{padding-left:4px;margin:6px 0}
  .md li{position:relative;padding:5px 0 5px 20px;list-style:none}
  .md li::before{content:"";position:absolute;left:3px;top:13px;width:6px;height:6px;border-radius:50%;background:var(--anta-red)}
  .md ul ul li::before,.md li li::before{background:var(--ink-3);width:5px;height:5px;top:14px}
  .md li li{padding:3px 0 3px 16px;color:var(--ink-2);font-size:14px}
  .md code{background:#f2f3f5;padding:1px 6px;border-radius:5px;font-size:13px;color:var(--anta-red-dark)}
  .md blockquote{background:var(--accent-soft);border:1px solid #f7d4da;border-radius:10px;padding:12px 15px;margin:12px 0;color:var(--ink)}
  .md .badge{display:inline-block;font-size:11.5px;font-weight:700;padding:1px 8px;border-radius:5px;margin-right:5px}
  .md .badge.done{background:#e8f8f2;color:var(--green)}
  .md .badge.prog{background:#fff3e8;color:var(--orange)}
  .md .badge.new{background:#eaf1ff;color:var(--blue)}
  .md .badge.def{background:#eef0f2;color:var(--ink-2)}
  .tbl-wrap{overflow-x:auto;margin:10px 0}
  .md table{border-collapse:collapse;width:100%;font-size:13px;min-width:520px}
  .md thead th{background:#2b2f36;color:#fff;font-weight:600;text-align:left;padding:9px 11px;border:1px solid #3a3f47;white-space:nowrap}
  .md tbody td{padding:9px 11px;border:1px solid var(--line);vertical-align:top;color:var(--ink-2)}
  .md tbody tr:nth-child(even){background:#fafbfc}
  /* Feishu 原生 <table> 直通 */
  .md > table, .md table.feishu-tbl{border-collapse:collapse;width:100%;font-size:13px;margin:10px 0;table-layout:fixed}
  .md table.feishu-tbl td{padding:9px 11px;border:1px solid var(--line);vertical-align:top;color:var(--ink-2);word-break:break-word}
  .md table.feishu-tbl tr:first-child td{background:#2b2f36;color:#fff;font-weight:600}
  .md table.feishu-tbl tr:first-child td strong{color:#fff}

  /* 缩略图 + lightbox */
  .md img.thumb,.md table.feishu-tbl img.thumb{display:inline-block;max-width:240px;max-height:160px;border:1px solid var(--line);border-radius:8px;cursor:zoom-in;margin:6px 6px 6px 0;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s;object-fit:cover;vertical-align:middle}
  .md img.thumb:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 4px 14px rgba(0,0,0,.12);border-color:var(--anta-red)}
  .md table.feishu-tbl img.thumb{max-width:100%;max-height:140px}

  /* 视频占位符 + 真实视频 */
  .video-ph{display:inline-block;background:#f6f7f9;border:1px dashed var(--line);border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--ink-3);margin:6px 0}
  /* 注意：.video-box 不加 overflow:hidden — 否则在 Chrome/Safari 某些版本会裁切 <video> 原生控件 hit-area，导致进度条无法拖动 */
  .video-box{display:block;margin:12px 0;background:#0f1115;border:1px solid var(--line);border-radius:10px;max-width:560px;box-shadow:0 2px 10px rgba(0,0,0,.08);position:relative}
  .video-box video{display:block;width:100%;max-width:100%;background:#000;outline:none;border-radius:10px 10px 0 0;position:relative;z-index:1}
  .video-box .vb-cap{padding:6px 12px;background:#1d2129;color:#cfd3d8;font-size:12px;border-top:1px solid #2a2e33;border-radius:0 0 10px 10px;position:relative;z-index:0}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(15,17,21,.92);display:none;align-items:center;justify-content:center;z-index:500;padding:30px;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:96%;max-height:92%;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5);cursor:default}
  .lightbox .lb-close{position:absolute;top:18px;right:22px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;width:42px;height:42px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .lightbox .lb-close:hover{background:var(--anta-red);border-color:var(--anta-red)}
  .lightbox .lb-tip{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.62);font-size:12.5px}

  .module-edit{margin-top:6px}
  .module-edit textarea{width:100%;min-height:200px;resize:vertical;font-family:"SF Mono",ui-monospace,Menlo,Consolas,"PingFang SC",monospace;font-size:13.5px;line-height:1.7;color:var(--ink);background:#fff;border:1px solid var(--edit);border-radius:10px;padding:14px 16px;outline:none}
  .module-edit textarea:focus{box-shadow:0 0 0 3px rgba(255,154,46,.18)}
  .edit-tip{font-size:12px;color:var(--ink-3);margin:6px 2px}
  .edit-actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
  .ebtn{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;padding:8px 16px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s}
  .ebtn:hover{transform:translateY(-1px)}
  .ebtn.ai{background:linear-gradient(120deg,#7a5cff,#1664ff);color:#fff;border:none}
  .ebtn.save{background:var(--anta-red);color:#fff;border:none}
  .ebtn.cancel{color:var(--ink-3)}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);background:#1d2129;color:#fff;font-size:14px;padding:14px 20px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;z-index:200;max-width:420px;line-height:1.6}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Modal (AI 润色) */
  .modal-mask{position:fixed;inset:0;background:rgba(20,22,26,.55);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
  .modal-mask.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .modal-h .ic{width:34px;height:34px;border-radius:10px;background:linear-gradient(120deg,#7a5cff,#1664ff);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px}
  .modal-h .t{font-size:16px;font-weight:700}
  .modal-b{padding:18px 22px}
  .modal-tip{background:#eef4ff;border:1px solid #d6e4ff;color:#1d2129;border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.7;margin-bottom:12px}
  .modal-tip b{color:var(--blue)}
  .modal-b .cap{font-size:12px;color:var(--ink-3);margin-bottom:6px}
  .modal-b textarea{width:100%;min-height:170px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,"PingFang SC",monospace;font-size:13px;line-height:1.7;color:var(--ink-2);background:#fafbfc;border:1px solid var(--line);border-radius:10px;padding:12px 14px;outline:none}
  .modal-f{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end}

  footer{text-align:center;color:var(--ink-3);font-size:12.5px;padding:20px 0 40px}
  footer .sep{margin:0 8px;color:var(--line)}

  @media (max-width:767px){
    :root{--side:0px}
    #sidebar{width:236px;transform:translateX(-236px);z-index:120}
    body.nav-collapsed #sidebar{transform:translateX(-236px)}
    body.mobile-nav-open #sidebar{transform:translateX(0)}
    body.mobile-nav-open::before{content:"";position:fixed;inset:0;background:rgba(15,17,21,.45);z-index:110}
    .page{margin-left:0;width:100%}
    #navToggle{left:14px;z-index:130}
    body.mobile-nav-open #navToggle{left:250px}
    .wrap{padding-left:16px;padding-right:16px}
    .brand-tag,.topbar h1,.active-week-title,.topbar .meta{margin-left:46px}
    .topbar h1{font-size:20px}
    .active-week-title{font-size:14px;line-height:1.45}
    .toolbar-inner{padding-left:16px;padding-right:16px}
    .week{padding:20px 16px}
    .md img.thumb{max-width:160px;max-height:120px}
  }
</style>
</head>
<body>

<aside id="sidebar">
  <div class="side-head"><span class="logo">ANTA</span><span class="ttl">历史周报</span></div>
  <div class="side-sub">📅 按自然周（周一–周日）· 最新在上</div>
  <div class="side-list" id="side-list"></div>
  <div class="side-foot" id="side-foot"></div>
</aside>
<button id="navToggle" title="折叠/展开导航">☰</button>

<div class="page">
  <header class="topbar">
    <div class="wrap">
      <span class="brand-tag">ANTA · 企业解决方案</span>
      <h1 id="doc-title">安踏企业解决方案 · 工作周报</h1>
      <div class="active-week-title" id="active-week-title"></div>
      <div class="meta" id="doc-meta"></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <span class="hint">👀 查看模式 · 左侧切换周次 · 点击模块「✏️ 编辑」修改 · 图片可点击放大</span>
      <span class="spacer"></span>
      <button class="tbtn" id="btn-reset">↺ 重置修改</button>
      <button class="tbtn primary" id="btn-download">⬇️ 导出 data.json</button>
    </div>
  </div>

  <main class="wrap">
    <details class="bg" id="bg" open>
      <summary>持续记录的背景信息 <span class="arrow">▾</span></summary>
      <div class="bg-body" id="bg-body"></div>
    </details>

    <section class="week" id="week"></section>
  </main>

  <footer>
    <div class="wrap" id="footer-text"></div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<!-- Lightbox 大图弹窗 -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close" title="关闭（Esc）">✕</button>
  <img id="lb-img" alt="">
  <div class="lb-tip">点击空白或按 Esc 关闭</div>
</div>

<div class="modal-mask" id="ai-modal">
  <div class="modal">
    <div class="modal-h"><span class="ic">✨</span><span class="t">AI 润色</span></div>

<script id="default-data" type="application/json">{"meta": {"title": "安踏企业解决方案 · 工作周报", "owner": "邹超", "team": "南区通用团队", "direction": "安踏企业 AI 解决方案", "updatedAt": "2026-06-30", "weekDef": "自然周（周一至周日），跨月不截断"}, "background": {"summary": {"source": "manual", "content": "本周报聚焦**安踏企业解决方案业务**，由邹超负责。主要工作贯穿安踏在 AI 内容生产、门店直播、商品智能化等方向的落地推进。\n\n- **负责人**：邹超\n- **核心客户**：安踏（重点）、特步 / 九牧等\n- **本阶段主要工作**：安踏 LUMI+Seedance 培训复盘、门店开播 SOP 编写、AI 水印合规分析、商品智能化需求预测 Agent 设计\n- **涉及产品**：LUMI（Seedance 2.0）、Ark Claw、TRAE、火山公有云、Data Agent 等"}, "docs": [{"title": "门店开播管理 SOP（管理层版）", "url": "https://bytedance.larkoffice.com/docx/OLhAdJFeYovYMAxVV35csH8fnOf"}, {"title": "门店开播管理 SOP（门店执行版）", "url": "https://bytedance.larkoffice.com/docx/FOS8dcHhsoDIPZx569JcI5xunfg"}, {"title": "安踏 LUMI + Seedance 2.0 培训复盘报告", "url": "https://bytedance.larkoffice.com/docx/XHMWdR1f5ohtI8xkbOTc1xUYnPG"}, {"title": "AI 水印影响分析（安踏案例）", "url": "https://bytedance.larkoffice.com/docx/HqvgdiyMzoXov9xdGXzcVJvQnIg"}, {"title": "商品智能化会议纪要 + Agent 设计", "url": "https://bytedance.larkoffice.com/wiki/N1dywjXIAinhgxk9zwBcTEIInUb"}, {"title": "【LUMI】申请去除显式水印合规承诺函", "url": "https://bytedance.larkoffice.com/docx/D1yodacQsoURChxiyYHcaB8Mn0c"}]}, "hints": {"customer": "个人重点客户的业务进展（大模型项目 MRR 1 万以上含商机/PoC，搬站 5 万以上，其他 10 万以上的项目）", "thinking": "结合技术/政策趋势、行业一线声音、竞对状况的思考；个人工作反思与改进；公司层面的产品/赛道建议", "solution": "各解决方案的进展、应用效果总结及反馈（含方案编写、原型开发、推广复制、生态建设、Good Case 等）；新业务场景/商业逻辑单独列出", "blocker": "目前面临的问题、卡点及求助（含大模型相关产品和其他产品）", "plan": "下周重点工作计划（客户拜访、材料编写、会议安排等）", "arena": "客户内部 AI 赛事 / 行业一线观察，提炼可复用的方法论与对标数据"}, "weeks": [{"id": "2026-W27", "range": "06/29 - 07/05", "rangeFull": "2026年06月29日—07月05日", "label": "2026年第27周", "current": true, "note": {"source": "manual", "content": "本周跨 6 月 / 7 月（自然周 6/29-7/05）。截至 6/30 已完成的事项见下，其余为本周在途与计划事项，暂无新增内容处已做占位说明。"}, "sections": [{"id": "customer", "num": 1, "title": "重点客户进展", "source": "ai", "content": "### 安踏\n\n#### ArkClaw / 火山杯 AI 创新大赛决赛\n\n- 【本周新增】**ArkClaw / 火山杯 AI 创新大赛决赛整理**（2026-06-30 下午）：本周完成安踏参赛项目决赛信息梳理，聚焦 AI 在海外零售、短视频内容、TikTok Shop、商品上架图、达人邀约等场景的实战落地。\n- **参赛项目**：安踏菲律宾 AI 零售情报、国际事业部短视频工具链、TikTok Shop 美国区、AI 产品上架图、达人邀约智能助手。\n- **核心结论**：TikTok Shop 内容生产效率提升 **12x**；达人邀约智能助手预计带来 **+$48 万/年 GMV**；AI 图片上架成本降低约 **88%**。\n\n#### TVC 制作 AI 化\n\n- 【已沟通】**TVC 制作 AI 化方向梳理**（2026-06-30，与安踏官网设计师）：围绕品牌广告片制作流程，完成 TVC 场景的结构化拆解。当前视觉主线为 **IP 形象 × 真人互动混剪**，覆盖儿童与成人两类受众。\n- **当前难点**：音频环节仍是主要卡点，包括高质量环境音、音乐与剪辑强同步，以及 AI 生成人声的性别稳定性与情绪表达。音乐生成当前已试用 **Suno**。\n- **下一步**：补充分镜图与场景卡，并将 BGM / 环境音 / 情绪人声 / 音画同步相关提示词沉淀进 Skill。\n\n#### 2026-07-01 与设计师沟通纪要\n\n- **背景**：围绕安踏官网 TVC 制作流程，与设计师补充对齐儿童与成人两类广告片的创作方式，以及音频处理在实际生产链路中的位置。\n- **核心场景**：当前 TVC 以**形象 + 真人结合**为主，人物与形象会发生互动；真人镜头同时覆盖儿童与成年人，成人场景常见明星或群像出镜，儿童场景对神态与画面质感要求更高。当前仍需继续补充分镜图与场景卡，便于后续 AI 生成拆解。\n- **痛点与现状**：制作流程通常先完成画面拍摄与片段准备，最后集中处理声音。最大瓶颈在**音乐与音效**：环境音质量要求高；音乐需要与剪辑节奏强同步；成人 TVC 仍依赖 AE 对明星视频元素做特效处理；儿童场景中 AI 生成容易出现眼神涣散、画面发暗；历史上还出现过同一批片段男声、女声切换不稳定的问题。\n- **AI 切入点**：优先切入 **BGM / 音乐、环境音、带情绪感的人声** 三类声音生成与稳定控制。现阶段音乐生成已试用 **Suno**；后续可把声音提示词、情绪控制、音画同步约束沉淀进 Skill，并探索用 AI 生成成人明星视频中的部分特效元素。"}, {"id": "thinking", "num": 2, "title": "业务思考", "source": "ai", "content": "- **决赛项目先证明 ROI，再决定复制顺序。** 12x 提效、+$48 万年增 GMV、88% 降本，已经足够支撑安踏内部优先级排序。\n- **TVC AI 化的主战场不在画面，而在声音。** 音乐、环境音和情绪人声一旦稳定，整条生产链才能真正提速。\n- **Skill 的价值开始从提示词库升级为生产约束库。** 把音画同步、情绪稳定性沉淀进去，才有机会复制到更多内容团队。"}, {"id": "solution", "num": 3, "title": "解决方案", "source": "ai", "content": "- **ArkClaw / 火山杯 AI 创新大赛决赛项目整理**：完成安踏 5 个参赛项目的结构化梳理，覆盖零售情报、短视频工具链、TikTok Shop、AI 产品上架图、达人邀约智能助手。\n- **TVC 制作 AI 化方向梳理**：围绕 IP 形象 × 真人互动混剪、音频生成与音画同步等问题，明确后续测试与 Skill 沉淀方向。"}, {"id": "blocker", "num": 4, "title": "问题 & 卡点", "source": "ai", "content": "本周 source=ai 的历史卡点已从 W27 清理；截至 2026-06-30，暂无新增需写入 W27 的大模型卡点。"}, {"id": "plan", "num": 5, "title": "下周计划", "source": "manual", "content": "- **【新增】海外整体 IT 规划盘点**：系统性盘点未来半年到一年安踏海外整体 IT 规划，覆盖 **IT Infra 层**（网络与专线、数据中台 / API 中台、身份权限与账号体系、云与合规基建、监控与安全）和 **业务应用层**（电商、门店、商品、市场、达人、财务等），输出一份可与火山、安踏海外 IT 对齐的规划底稿，识别火山可承接的底座与应用切入点。\n- **门店开播 SOP**：与安踏运营/IT 对齐 SOP 落地路径，推动试点门店按执行版跑通首场直播。\n- **LUMI 复盘行动项**：推进生产稳定性问题（QPS/taskid/账号管理）反馈与排期，启动安踏鞋服电商专属 skill 沉淀。\n- **商品智能化 Agent**：协助客户完成需求拆解、规则设定与基础组件搭建，确认是否推进落地；同步统一关键指标口径、确认海外数据粒度。\n- **火山杯大赛延续与提效统计**：联合国际事业部 IT，推动 40 个课题按优先级（P0/P1）落地为可复用 Skill / Agent，并建立提效数据回收机制，为 Q3 扩席提供依据。\n- **AI 水印合规**：推动形成统一法务口径与合规输出方案建议。\n- 其它客户拜访与材料编写计划，待补充。"}, {"num": 6, "id": "arena", "title": "行业洞察 · 内部赛事", "source": "manual", "content": "### ArkClaw 大赛决赛要点（2026-06-30）\n\n本周参与并整理安踏客户内部 ArkClaw 大赛决赛，5 个参赛项目均聚焦 AI 在安踏海外业务的实战落地，核心数据与结论如下：\n\n- **内容产能是增长瓶颈**：TikTok Shop 美国区单条视频产能提效 12 倍（2h→10min）、成本降低 90%（$60→$5）；竞品对标显示视频数量与销量正相关，安踏关联视频量仅为 Vans 的 1/2.5。\n- **达人邀约智能助手**：合作链路由 7 步精简为 5 步，自制视频销售占比 0.4%→5%，月增 GMV 约 $4 万、年预计 +$48 万。\n- **菲律宾 AI 零售情报**：33 页年度经营报告从数天压缩到数小时，识别 37 家低坪效门店，定位棉兰老岛为最高盈利区域。\n- **AI 内容工具链（国际事业部）**：视频日产能翻倍（10→20 条/8h），素材可用率 50%→86.96%，日制作成本 ¥2000→¥1143。\n- **AI 图片上架 / 视频验证**：单张成本 0.25 元 vs 竞品 1 元、成功率 90% vs 40%；菲律宾 AI 短视频实测播放约为自制视频的 20 倍并产生真实转化。\n\n**结论**：AI 以 10 倍级提效与约 90% 降本直接撬动 GMV，安踏海外的核心抓手是打开内容与数据产能瓶颈。详见 [ArkClaw 决赛核心观点整理](https://bytedance.larkoffice.com/wiki/N1dywjXIAinhgxk9zwBcTEIInUb)。"}]}, {"id": "2026-W26", "range": "06/22 - 06/28", "rangeFull": "2026年6月22日（周一） — 6月28日（周日）", "label": "2026 年 第 26 周", "current": false, "note": {"source": "ai", "content": "本周内容已从飞书周报原文档抽取，保留原文与图片（缩略图，可点击放大）。"}, "sections": [{"id": "customer", "num": 1, "title": "重点客户进展", "source": "ai", "content": "### 安踏：\n\n- Ark claw- 项目售前中 ：\n①初赛结束，协助评定出 12 个入围决赛的作品；\n![](images/img_J91WbmECAokdguxDEWvc45SanVh.png)\n②海外业务副总裁参加比赛结果初步复盘，提出未来需要将AI与内部业务系统深度集成，才能做出业务需要的AI应用。\n③业务副总裁牵头，让线下门店的产品经理分享当前线下从商品售卖计划->订货->销补调整的全场景，共同分析AI能够覆盖的能力边界及范围，方案思路如下；[安踏海外-门店商品全链路管理使用AI实现的思路](https://bytedance.larkoffice.com/wiki/N1dywjXIAinhgxk9zwBcTEIInUb)\n- LUMI - X0W/月 - 上量转化中：\n①和官网设计师做TVC 广告视频生成的尝试。[广告视频测试](https://bytedance.larkoffice.com/wiki/BNcVw7UDWifpwskUxgvczD7on6e)\n- TRAE- 售前 ：\n\t- 客户技术架构部本周做完资源盘点，针对使用率较低用户（日均低于X0万、且未使用自定义模型的用户）进行缩减，目前缩减5+个席位，在用席位120+\n- 公有云-X0万/月-上量中：\n\t- 本周无进展，客户新项目上线后稳定运行\n- 其它：force大会和安踏IT应用负责人沟通七月份新增三个事项跟进：\n\t- ①data-agent公域数据部分提供API测试接口，接入客户商品企划等数据进行使用，但目前抖音电商的商品成交聚合后的数据无法透传给客户；\n\t- ②7月初和客户沟通agent plan，尤其是doubao seed 2.1的coding能力，同时客户关注deepseek v4在火山侧的报价情况；\n\t- ③和客户介绍飞鸽客服的能力介绍\n\t- Seedream模型即将发布，已将客户的一批测试数据发给产解，预计下周三能跑出测试结果，再基于测试的结果判断是否推进下一步的seedream模型后训练工作，客户的判断标准[seedream测试判断标准](https://bytedance.larkoffice.com/wiki/Cda2wn4g2ilF5WkbI7sczHFunRd)\n\n\n\n### 楷芯网络：\n\n- 项目运营：\n\t- TRAE-项目售前中：本周无进展\n\t- seedance2.0：本周无进展\n\t- 工具包沉淀：本周无进展\n\n###"}, {"id": "thinking", "num": 2, "title": "业务思考", "source": "ai", "content": "会定规则，是AI在企业落地的标准。本周和安踏做了两个具体场景的探索，客户慢慢从\"会用AI工具\"到\"会定规则\"，也在思考AI 落地的真正门槛在于会定规则。两个场景分别涉及：TVC级的品牌广告尝试、复杂业务场景运用arkclaw实现。\n1. 场景一：和安踏官网设计师做的TVC尝试\n\t1. 视频生成。客户设计师一起初步测试：三个输入要素会影响视频的最终生成质量。\n\t- 场景图 = 定基调（氛围给对了，风格就对了）输入的场景图氛围感越准确，生成的视频风格越对。比如一个户外运动场景，场景图里有金色夕阳、有山脊剪影、有风沙质感，模型就能顺着这些信息生成匹配的镜头语言。场景图错了，后面怎么调 prompt 都很难拉回来。\n\t- 商品细节图 = 锁主体（AI知道拍什么）\n\t- 提示词 = 传意图（相当于导演指令）\n测试及最终测试的视频产物：[广告视频测试](https://bytedance.larkoffice.com/wiki/BNcVw7UDWifpwskUxgvczD7on6e)\n<font background_color=\"light_yellow\">目前的问题也有，1分钟的广告视频生成后，BGM添加也是另外一个难点，目前还没找到太好的解决方案<\/font>\n\t1. 场景图很重要。因为场景图本周给客户定向做的 Seedream 生图 Skill，客户测试后反馈不错。模型肯定是是gpt-img2或者nano 目前是强于seedream5.0 lite的，但这次我们主要是定向帮忙做了pe优化。在 Skill 做了一套规则，主要包括：生成脚手架（主体→场景→构图→风格→光影→质量）、A/B 轴分离 + 显式冻结（解决色彩漂移和过度生成）、禁忌词表、参考图角色分配。\n\t\t1. [生图-安踏Skill 原始内容汇总](https://bytedance.larkoffice.com/wiki/Gdu7w6srBi8PGNkx5dfct4v9nVf)对比效果如下：当然seedream的pe还有不少地方要优化的，例如AI感强（人物过于细腻、光源混乱、服饰的暗部区域缺一层阴影用来增强体积感）。\n\t<table col-widths=\"227,235\">\n    <tr>\n        <td>未使用skill的出图效果<\/td>\n        <td>skill加载后出图效果<\/td>\n    <\/tr>\n    <tr>\n        <td>![](images/img_VNw1brMY4ogEGyxG11KcxuxMnCf.png)<\/td>\n        <td>![](images/img_ORMvbZiMbo1qQrxGAnIcdrmJnAc.png)<\/td>\n    <\/tr>\n<\/table>\n模型强大是一个方面，找好细分场景、有人定向服务，输出图也未必差\n1. 还有一个小细节，关于生图的rules的。例如提示词中：cinematic、enhance、masterpiece**&nbsp;**这类词需要做成负向提示词。因为表面上看，这些词都是\"好词\"，但猜测这些词在训练数据中，与特定的后期处理行为强相关。具体来说如：`enhance` → 关联锐化、饱和度拉升、HDR 色调映射\n把这些词放进 prompt，模型不是\"理解\"了审美意图，而是激活一条路径：\"训练数据里带这些标签的图都长这样 -> 我也要输出长这样的图\"。\n结果就是：色彩被无差别增强、皮肤被过度磨皮、画面出现不自然的 HDR 感\n\n2. 场景二：和海外商品团队沟通复杂业务场景如何使用arkcalw实现。这中间也涉及到rules如何定义，以货品规划为例，内部系统对接是工程问题，另外一个问题：Rules 怎么定。\n\t1. 正向 Rules：例如\"每年要有增长\"——但增长多少？按什么口径？品类之间如何平衡？是否动态计算？还是给一个基本要求有增长即可\n\t2. 逆向 Rules：例如\"不能出现断码\"——季节性商品的断码定义是否不同？\n\n定义太宽，AI 输出无约束；定义太窄，限制业务灵活性。Rules 的定义质量，直接决定了 AI 输出的业务可用性。\n\n[安踏海外-门店商品全链路管理使用AI实现的思路](https://bytedance.larkoffice.com/wiki/N1dywjXIAinhgxk9zwBcTEIInUb)\n小结：人对业务的理解深度，决定了规则的质量。规则的质量，决定了 AI 输出的上限。而本周做的生图 Skill 的禁忌词表、海外商品要去做的Arkclaw 的 Rules 体系—本质上都是同一件事：把业务判断结构化成 AI 能执行的约束，这个是解决方案未来要去积累的方向。"}, {"id": "solution", "num": 3, "title": "解决方案", "source": "ai", "content": "1. 鞋服行业AI场景方案：[鞋服行业AI应用场景分析-以安踏为例](https://bytedance.larkoffice.com/wiki/LLI3wOiNIisCwakeW47cwGcZnJb)\n\n2. [安踏LUMI使用情况复盘](https://bytedance.larkoffice.com/wiki/BufqwBmokiOfk9kEn3LcRCjlntf)\n\n3."}, {"id": "blocker", "num": 4, "title": "问题 & 卡点", "source": "ai", "content": "1. 大模型相关问题：\n\n<table col-widths=\"137,199,160,121,243,164\">\n    <tr>\n        <td>**模型名称及版本**<\/td>\n        <td>**问题描述**<\/td>\n        <td>**影响客户**<\/td>\n        <td>**金额（MRR）**<\/td>\n        <td>**当前方案及进展**<\/td>\n        <td>**下一步计划**<\/td>\n    <\/tr>\n    <tr>\n        <td rowspan=\"2\">Seedance 2.0 <\/td>\n        <td>当前seedance2.0仅能支持15秒生成，但客户美区的视频多为1分钟左右的达人评测或讲品视频。希望sd2.0能够支持的视频时长增加<\/td>\n        <td>安踏<\/td>\n        <td><\/td>\n        <td>已解决<\/td>\n        <td><\/td>\n    <\/tr>\n    <tr>\n        <td>鞋服行业中制作短视频时有一些特定的动作，目前seedance无法理解，例如踩屎感<\/td>\n        <td>安踏<\/td>\n        <td><\/td>\n        <td>1. 提需给产解\n2. 基于特定动作尝试整理专项词库\n3. 基于特定动作进行视频参考，但该方式的问题在于工作量过大<\/td>\n        <td><\/td>\n    <\/tr>\n    <tr>\n        <td>TRAE<\/td>\n        <td>目前TRAE池化的模型额度仅支持按人均进行分类，不支持按人进行分配。\n例如，客户有10个席位，购买10亿tokens，目前仅支持人均1亿的tokens，不支持张三2亿tokens、李四3亿tokens的分配方式<\/td>\n        <td>安踏<\/td>\n        <td>130席开通（本周增加50席）<\/td>\n        <td>提需给产解，已解决\n![](images/img_ZO8nbj8lAoXc4Mxo3mZcSglXngc.png)<\/td>\n        <td><\/td>\n    <\/tr>\n<\/table>"}, {"id": "plan", "num": 5, "title": "下周计划", "source": "ai", "content": "1. 福州某客户介绍大模型能力\n\n2. 安踏\n\t1. 定向优化skill：生图提示词/skill优化、鞋服特有动作提示词/skill尝试优化、TVC广告涉及的skill问题定向优化\n\t2. 支持arkclaw决赛，支持用户做最后的skill优化工作\n\n3. 拜访特步，介绍电商投流广告的做法"}]}, {"id": "2026-W25", "range": "06/15 - 06/21", "rangeFull": "2026年6月15日（周一） — 6月21日（周日）", "label": "2026 年 第 25 周", "current": false, "note": {"source": "ai", "content": "本周内容已从飞书周报原文档抽取，保留原文与图片（缩略图，可点击放大）。"}, "sections": [{"id": "customer", "num": 1, "title": "重点客户进展", "source": "ai", "content": "### 安踏：\n\n- Ark claw- 项目售前中 ：\n①大赛多数按时完成作品提交，**整体进展良好，多数课题已接近收尾。** 课题已完成 Skill 化并稳定跑通，包括：海外多国家审美视觉生成、TikTok 退货管控与对账自动化、官网数据智能看板、达人短视频转品牌视频等。\n②仍在推进中的课题，主要卡点集中在平台 API 对接与业务逻辑打磨两个环节。 亚马逊广告智能优化、广告归因与营销分析系统、达人智能筛选建联等课题进度在 50%～85% 之间，核心瓶颈是 Shopee 或 TikTok 开发者账号申请进展缓慢，以及广告分析逻辑仍在业务侧调试。好处是越来越接近业务的深水区。\n![](images/img_L4GAbC5agoOiJvxP5wjcF5XVnee.png)\n- LUMI - X0W/月 - 上量转化中：\n①视频生成类：\n（1）美区、泰国的TK团队完成试点素材投放，目前投放后的数据表现与手工拍摄持平，甚至美区TK矩阵号的数据表现超过手工拍摄。<font background_color=\"light_green\">如下图中<\/font>，首条短视频为seedance2.0制作，其它为线下拍摄；\n![](images/img_N1tsbde9RoJ15nx0PYscBFnintb.png)\n（2）协助美区制作达人短视频，并进行投放，验证达人视频的跑量情况，客户侧有意愿在达短视频的制作批量使用seedance2.0，但问题集中在：跑量数据目前还在小范围测试、整体达人意愿度还未明确\n（3）东南亚本周的验投情况及与运营团队初步复盘结论：AI内容可长期批量产出，流量表现仍存提升空间，投放ROI有待更多数据验证。东南亚的数据播放情况如下[https://d43eee0a19c6.aime-app.bytedance.net/](https://d43eee0a19c6.aime-app.bytedance.net/)  \n②生图类：上周和客户定向针对电商海报图[东南亚生图bad case及优化方案](https://bytedance.larkoffice.com/wiki/VKifwYmpPidi4uk4OvVcaEnjn4b)后，客户本周测试及反馈定向优化的PE生成效果优于nano，这也给了我们个启发：客户侧并非所有的场景都必须使用nano；即便nano很强，但是seedream在服务支撑到位的前提下，也是可以去撬动客户的部分场景\n\t<table col-widths=\"100,100,100,100\">\n    <tr>\n        <td>nano生成的效果：色彩搭配不够好<\/td>\n        <td>nano生成的效果：色彩搭配不够好<\/td>\n        <td><font background_color=\"light_green\">seedream5生成的效果<\/font><\/td>\n        <td><font background_color=\"light_green\">seedream5生成的效果<\/font><\/td>\n    <\/tr>\n    <tr>\n        <td>![](images/img_TjvWb3uMBopa9UxDoWIcu3RxnAd.png)<\/td>\n        <td>![](images/img_HiBcbGUUNoeJL7xg5iZcySGKnsb.png)<\/td>\n        <td>![](images/img_Axutbs8RQoHXH1xUoqjczjymnTe.png)<\/td>\n        <td>![](images/img_VvI9b8nGjoXTJPx5vspc1Tnin7e.png)<\/td>\n    <\/tr>\n<\/table>\n\n- TRAE- 售前 ：\n\t- 本周暂无进展，席位数130+\n- 公有云-X0万/月-上量中：\n\t- 客户侧系统已完成火山部署，云资源侧已稳定，当前已处于软件交付阶段，火山侧无卡点。预计增量X万/月\n\t- IT后续有计划在海外自建统一的API管理调度平台，由IT统一接入tk、Google、亚马逊等电商平台的数据，并交由AI工具调用。自建平台有机会引导部署在火山引擎公有云，同时可带动大模型收入，协助IT做好立项与支撑工作\n\n### 楷芯网络：\n\n- 项目运营：\n\t- TRAE-项目售前中：本周无进展\n\t- seedance2.0：本周无进展\n\t- 工具包沉淀：梳理火山引擎侧相关的产品包及工具的整理；协助客户进行抖店会场素材的搭建\n\n### 其它客户：\n\n- 特步：拜访特步IT团队，沟通交流seedance2.0、coze在鞋服企业的使用场景及姿势；\n- 九牧：拜访九牧CIO，沟通交流seedance2.0、大模型在零售企业的使用场景及姿势；"}, {"id": "thinking", "num": 2, "title": "业务思考", "source": "ai", "content": "AI 在传统品牌企业落地这件事，<font background_color=\"light_green\">不是让某一个人更提效<\/font>、更能创造价值，而是让业务能用、IT能干、火山能供货，最后形成一条<font background_color=\"light_green\">人人有活干、层层都能创造价值<\/font>的闭环。\n为什么会有这样的感受，上周思考到 AI 工具只有和客户有 IT 系统连接起来，才算真正落地。但实际落地的时候，发现对接并没有那么简单：\n1. 本周做了TK对接具体的开发尝试，相对来说还是比较复杂的，跟飞书开放平台是类似的，是两段式鉴权体系。\n- 开发者凭证与商家授权分离：首先，开发者需要到服务商中心申请专属的 `app_key` 和 `app_secret`。接着，走的是 OAuth 2.0 流程，在商家授权后交换真正的访问令牌（`access_token`）和用于识别店铺的 `shop_cipher`  参考文档： https://www.keyapi.ai/blog/tiktok-shop-api-integration-guide-sellers/\n- 动态令牌维持与权限校验：不仅如此，在后期的每次调用中，请求都必须带着 `access_token`（只有 90 天有效期），系统同时还会持续校验是否获得了必需的操作权限：参考链接：https://www.echotik.live/blog/tiktok-shop-api-errors-authentication-integration-guide/\nGoogle平台类似，Meta的健全体系和数据调用更加复杂。\n1. 我们在开发的时候图快，把拿到的 access key 直接丢给业务同学，让他们自己填在 arkclaw 里跑。其实，这种把密钥分散在业务手上的做法存在隐患。因为一个TK账号需要一个access key，几百个账号就是几百个ak，风险太高了。正确的做法得通过前端的平台来集中管控。\n2. 未来这个平台，暂且叫（API中台)的大致范围：\n\t1. 对外统一管理：抖店、TK这类平台的授权申请，并转签为内部AK；对内统一对接业务中台这类业务系统\n\t2. API 的使用姿势、接口说明被存为如 Markdown 文档，专供 AI 读取了解是否要申请调用这个API；\n\t3. 业务通过arkclaw/ TRAE /AI 工具调用API的时候，业务要做的就是给AI工具发一句话指令，背后的接口申请判断、安全鉴权和脚本调度，都由AI工具的LLM理解后通过平台网关安静地跑完，保证了每次调用的准确性和安全性\n3. 这套<font background_color=\"light_green\">工具谁来开发呢，应该鼓励让安踏的IT<\/font>进行开发，安踏购买火山的agent kit、公有云等为底座，再利用AI coding+客户的研发快速完成平台开发，再打通内外部系统；内外部系统打通，业务才有可能深度使用起来；业务同学可以用龙虾/ AI去做分析、提需求、拿结果；IT 同学负责把外部平台、内部系统和数据接口真正接起来；火山这边则提供arkclaw、TRAE/WORKS、seedance、大模型和云底座，把上层应用和底层能力托住。这样才能形成人人有活干、层层创造价值的良性循环。"}, {"id": "solution", "num": 3, "title": "解决方案", "source": "ai", "content": "- 鞋服行业AI场景方案：[鞋服行业AI应用场景分析-以安踏为例](https://bytedance.larkoffice.com/wiki/LLI3wOiNIisCwakeW47cwGcZnJb)\n- [安踏LUMI使用情况复盘](https://bytedance.larkoffice.com/wiki/BufqwBmokiOfk9kEn3LcRCjlntf)"}, {"id": "blocker", "num": 4, "title": "问题 & 卡点", "source": "ai", "content": "大模型相关问题：\n<table col-widths=\"137,199,160,121,243,164\">\n    <tr>\n        <td>**模型名称及版本**<\/td>\n        <td>**问题描述**<\/td>\n        <td>**影响客户**<\/td>\n        <td>**金额（MRR）**<\/td>\n        <td>**当前方案及进展**<\/td>\n        <td>**下一步计划**<\/td>\n    <\/tr>\n    <tr>\n        <td rowspan=\"2\">Seedance 2.0 <\/td>\n        <td>当前seedance2.0仅能支持15秒生成，但客户美区的视频多为1分钟左右的达人评测或讲品视频。希望sd2.0能够支持的视频时长增加<\/td>\n        <td>安踏<\/td>\n        <td><\/td>\n        <td>提需给产解；<\/td>\n        <td><\/td>\n    <\/tr>\n    <tr>\n        <td>鞋服行业中制作短视频时有一些特定的动作，目前seedance无法理解，例如踩屎感<\/td>\n        <td>安踏<\/td>\n        <td><\/td>\n        <td>1. 提需给产解\n2. 基于特定动作尝试整理专项词库\n3. 基于特定动作进行视频参考，但该方式的问题在于工作量过大<\/td>\n        <td><\/td>\n    <\/tr>\n    <tr>\n        <td>TRAE<\/td>\n        <td>目前TRAE池化的模型额度仅支持按人均进行分类，不支持按人进行分配。\n例如，客户有10个席位，购买10亿tokens，目前仅支持人均1亿的tokens，不支持张三2亿tokens、李四3亿tokens的分配方式<\/td>\n        <td>安踏<\/td>\n        <td>130席开通（本周增加50席）<\/td>\n        <td>提需给产解，已解决\n![](images/img_L1cGbuZJmoGz2sx3datc7iOGnWe.png)<\/td>\n        <td><\/td>\n    <\/tr>\n<\/table>"}, {"id": "plan", "num": 5, "title": "下周计划", "source": "ai", "content": "- 陪同安踏AI应用负责人参加force大会\n- 安踏\n\t- 驻场跟进claw大赛，跟进美区达人短视频后续投放跟进，并基于投放情况探讨后续推进方式\n\t- 调研国内其它设计师团队的需求，完善针对国内设计师提出的提示词辅助编写skill"}]}, {"id": "2026-W24", "range": "06/08 - 06/14", "rangeFull": "2026年6月8日（周一） — 6月14日（周日）", "label": "2026 年 第 24 周", "current": false, "note": {"source": "ai", "content": "本周内容已从飞书周报原文档抽取，保留原文与图片（缩略图，可点击放大）。"}, "sections": [{"id": "customer", "num": 1, "title": "重点客户进展", "source": "ai", "content": "### 安踏：\n\n- Ark claw- 项目售前中 ：\n开始arkclaw大赛辅导：\n①API类，如Tik Tok、虾皮等电商平台的MVP场景已打通，能够完成客户部分生产环境打通；\n②数据分析类，如电商平台广告投放优化、电商库存ROI管控及优化、线下门店管理等最小单元基本形成，平均进度在50%以上，预计下周整体能够完成作品，目前的数据分析HTML示意\n![](images/img_W0eHb5EnsomtaGxfISOcCW4znXb.png)\n③视觉类：电商批量生图类，针对电商营销海报的生图bad case，[东南亚生图bad case及优化方案](https://bytedance.larkoffice.com/wiki/VKifwYmpPidi4uk4OvVcaEnjn4b)；泰国TK运营团队完成首批sd2.0素材制作，并于本周五投放到海外TK账号，下周跟进投放数据；美区tk运营团队本周完成首批sd2.0内容初步制作，下周会继续准备一批素材后在美区投放。目前制作成果示意：\n<table col-widths=\"100,100,100,100\">\n    <tr>\n        <td>美区-带短带货视频<\/td>\n        <td>美区-带短带货视频<\/td>\n        <td>东南亚-带货视频示意<\/td>\n        <td>东南亚-带货视频示意<\/td>\n    <\/tr>\n    <tr>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-12_17-56-14_ByteArtist_1.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-12_17-56-14_ByteArtist_1.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-12_17-58-11_ByteArtist_1.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-12_17-58-11_ByteArtist_1.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/1125A5508A-27.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">1125A5508A-27.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/182252272686792733_trans.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">182252272686792733_trans.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n    <\/tr>\n<\/table>\n- LUMI - X0W/月 - 上量转化中：\n①客户侧有一类提示词需要复用，但需要更换商品、人物、场景等实体内容，开发skill针对原提示词中涉及到的影响范围进行批量更换，产物的示意如下，客户的设计师及拍剪团队开始使用，反馈效果较好：\n![](images/img_EHRtbKD40o1Vuvxf2nkcTvePncd.png)\n②针对安踏有一部分TVC类场景，虽然用量不大，但针对安踏集团内部提升seedance影响力具有较高价值，本周初步针对故事板场景制作skill让用户进行测试，故事板通过skill跑出的产物示意如下，下周继续测试和修正：\n\t<table col-widths=\"100,100,100\">\n    <tr>\n        <td>![](images/img_ZLdDbazANoSXETxW3wlcQPHfnKf.png)<\/td>\n        <td>![](images/img_JeiHbe5fLoOFqnx7iIccAYa3n5f.png)<\/td>\n        <td>![](images/img_DHFEbAQSmod0orxh6NJcvZsLnff.png)<\/td>\n    <\/tr>\n    <tr>\n        <td>![](images/img_PzwtbzktooVxjcxrysac93eMn6b.png)<\/td>\n        <td><\/td>\n        <td><\/td>\n    <\/tr>\n<\/table>\n②针对安踏特有的动作场景进行定向优化，效果能用但还未很好解决客户问题。以鞋为例，针对如踩屎感等动作的优化效果示意如下：\n\t<table col-widths=\"354,262\">\n    <tr>\n        <td>原视频，主要问题在于鞋子第十秒到第十二秒的动作<\/td>\n        <td>优化后的视频：主要优化在13秒-15秒鞋子的动作部分<\/td>\n    <\/tr>\n    <tr>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-05_15-26-13_炉米Lumi_1.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-05_15-26-13_炉米Lumi_1.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/c4aa7332-5699-4cf6-a341-7283f44db01a.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">c4aa7332-5699-4cf6-a341-7283f44db01a.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n    <\/tr>\n<\/table>\n\n\n- TRAE- 售前 ：\n\t- ①安踏技术架构部本周选定上海团队作为推广试点团队，开通TRAE席位50个；\n\t- ②安踏AI应用部本周自行测试trae产品，已将TRAE的产品使用手册及好的实践整理后发送给客户。[🚀 TRAE 高阶使用技巧与最佳实践-for安踏0608](https://bytedance.larkoffice.com/wiki/VCd8w7jXribApiklICMcCz5xnXd)；\n\t- ③本周和AI应用部沟通未来tokens的使用场景，主要包括：VLM、coding（建议客户尝试未来沟通汇报方式使用HTML格式，替代过去Excel、PPT等沟通方式，形式更稳定、内容更丰富）、生图及生视频类场景，并向客户建议使用agnet plan模式接入模型。\n\n- 公有云-X0万/月-上量中：\n\t- 当前已完成资源开通及客户侧系统部署，火山侧无卡点，客户侧已完成初步验收，当前软件供应商正在进行软件内部调试，火山侧保持高优支持。预计增量X万/月\n- VikingDB--新增需求：和客户完成Viking向量库的产品介绍。客户还是想要同步了解data agent知识库可私有化版本的能力，以及想要了解相应的案例情况，预计端午节前后和客户约data agent交流。\n\n### 楷芯网络：\n\n- 项目运营：\n\t- TRAE-项目售前中：本周无进展\n\t- seedance2.0：本周无进展\n\t- 工具包沉淀：梳理火山引擎侧相关的产品包及工具的整理"}, {"id": "thinking", "num": 2, "title": "业务思考", "source": "ai", "content": "这周在推进安踏相关机会时，一个感受越来越明确：AI工具如果只是停留在单点能力演示，客户会觉得\"能看\"，但很难真正\"能用\"，只有和客户现有 IT 系统连接起来，才算真正落地。\n1. 以 arkclaw 比赛中的场景为例，虽然业务通过导表能跑出不少业务数据分析报表，但客户很快就反馈新问题，<font color=\"red\">如果不能和他们现在的业务中台打通<\/font>，这些报表未来的维护量就太大，<font color=\"red\">很难进入日常经营动作<\/font>。\n2. 这里面反映出来一个简单的道理：对客户而言，AI 本身不是最终采购对象，能够嵌进现有业务流程、并且和业务系统联动的能力，才是这类企业客户最终能买单的点。安踏通过比赛，可以接受每个人要有一个养虾、养AI的过程，但是数据接不上，再怎么养都没用。从这个角度看，未来不仅要卷业务，还要卷客户的IT，让他们做好业务中台的数据接口和开放，否则AI没法在客户侧最终落地\n3. 同样的判断放到 sd2.0 上也成立。sd2.0 如果只是做内容生成，目前看确实很惊艳，但本质上还是一个相对孤立的工具层；但如果能进一步把抖店、TK 等关键平台的数据打通，价值就会完全不一样。因为客户关心的不是多了一个AI工具，而是这个工具能帮助他们把内容、交易和经营分析串起来，形成更直接的业务动作闭环。当然，内容和数据的结合本身也是一个非常复杂的问题，需要一段时间的探索，才有可能出来一些结论。\n小结：AI 项目的落地深度，系统集成度是一个重要的评判标准。前期看起来是接口问题，往后看其实是产品形态问题，我们交付的不能只是一个能力点，而要是一套能接入客户数据、嵌入客户流程、被业务持续调用的系统能力。\n但这里也有风险：如果我们只停留在项目制对接，交付会重、复制会慢；如果标准化做得不够深，又容易被客户内部 IT 或其他供应商替代。所以这里头<font color=\"red\">需要一些生态合作伙伴<\/font>，这个合作伙伴的能力象限可能是：有系统集成能力、有开发能力、有AI工具的使用和培训能力。"}, {"id": "solution", "num": 3, "title": "解决方案", "source": "ai", "content": "- 鞋服行业AI场景方案：[鞋服行业AI应用场景分析-以安踏为例](https://bytedance.larkoffice.com/wiki/LLI3wOiNIisCwakeW47cwGcZnJb)\n- [安踏LUMI使用情况复盘](https://bytedance.larkoffice.com/wiki/BufqwBmokiOfk9kEn3LcRCjlntf)"}, {"id": "blocker", "num": 4, "title": "问题 & 卡点", "source": "ai", "content": "大模型相关问题：\n<table col-widths=\"137,199,160,121,243,164\">\n    <tr>\n        <td>**模型名称及版本**<\/td>\n        <td>**问题描述**<\/td>\n        <td>**影响客户**<\/td>\n        <td>**金额（MRR）**<\/td>\n        <td>**当前方案及进展**<\/td>\n        <td>**下一步计划**<\/td>\n    <\/tr>\n    <tr>\n        <td rowspan=\"2\">Seedance 2.0 <\/td>\n        <td>当前seedance2.0仅能支持15秒生成，但客户美区的视频多为1分钟左右的达人评测或讲品视频。希望sd2.0能够支持的视频时长增加<\/td>\n        <td>安踏<\/td>\n        <td><\/td>\n        <td>提需给产解<\/td>\n        <td><\/td>\n    <\/tr>\n    <tr>\n        <td>鞋服行业中制作短视频时有一些特定的动作，目前seedance无法理解，例如踩屎感<\/td>\n        <td>安踏<\/td>\n        <td><\/td>\n        <td>1. 提需给产解\n2. 基于特定动作尝试整理专项词库\n3. 基于特定动作进行视频参考，但该方式的问题在于工作量过大<\/td>\n        <td><\/td>\n    <\/tr>\n    <tr>\n        <td>TRAE<\/td>\n        <td>目前TRAE池化的模型额度仅支持按人均进行分类，不支持按人进行分配。\n例如，客户有10个席位，购买10亿tokens，目前仅支持人均1亿的tokens，不支持张三2亿tokens、李四3亿tokens的分配方式<\/td>\n        <td>安踏<\/td>\n        <td>130席开通（本周增加50席）<\/td>\n        <td>提需给产解<\/td>\n        <td><\/td>\n    <\/tr>\n<\/table>\nAI应用，LUMI：\n- 功能性需求，已提需给产研能排期：\n\t1. 用户管理支持账号检索 \n\t2. 用户管理支持账号删除 ，目前是账号禁用\n\t3. 视频生成支持关闭AI水印 \n- 需要LUMI的算点不要按照12个月进行计收\n- 大促前的运营、设计师和技术支持\n- 需要能够从目前的版本升级至apaas的方案\n- 需要行业级合作伙伴，能够解决从LUMI到鞋服行业应用中的skill开发问题\n- 需要一个看板，能够监控每天LUMI上算点的用量"}, {"id": "plan", "num": 5, "title": "下周计划", "source": "ai", "content": "- 安踏\n\t- 驻场跟进claw大赛，重点解决：美区和东南亚视频生成优化及后续投放跟进、seedream在电商主图构建、电商数据接口打通、数据分析等共性问题；\n\t- 重点完善针对安踏国内设计师提出的提示词辅助编写skill\n\t- 支持安踏force大会分论坛的材料准备\n- 拜访特步IT团队，介绍火山引擎的大模型能力\n- 准备楷芯网络的sd培训材料"}]}, {"id": "2026-W23", "range": "06/01 - 06/07", "rangeFull": "2026年6月1日（周一） — 6月7日（周日）", "label": "2026 年 第 23 周", "current": false, "note": {"source": "ai", "content": "本周内容已从飞书周报原文档抽取，保留原文与图片（缩略图，可点击放大）。"}, "sections": [{"id": "customer", "num": 1, "title": "重点客户进展", "source": "ai", "content": "### 安踏：\n\n- Ark claw- 项目售前中 ：\n\t1. 开始arkclaw大赛：①开始现场辅导工作，协助客户每个参赛队伍进行比赛课题的落地方案研讨、demo验证及系统使用辅助；②客户参赛课题主要集中在：api接入arkclaw运用类（如TK、虾皮、内部电商中台开放的api接出数据）、数据分析类（电商数据分析、门店数据分析、HTML生成等）和营销物料（电商营销视频、视频翻译、营销海报生成与翻译）生成类，计划下周将参赛课题抽象出标准化和SOP执行的样板，可供新增团队参考；③下周后半周国内辅导相对稳定后，开放海外报名及赛事辅导通道，将国内的经验复制给海外，已和产解和CSM提需增加人手，应对海外参赛课题。目前参参赛队伍30支，预计加到100支队伍\n\t2. 目前报名参赛的名单如下：\n![](images/img_TvjebavxgoXskpx0h8Hcrrxxn5c.png)\n- LUMI - X0W/月 - 上量转化中：\n\t- 本周LUMI消耗量情况，目前看工作日能够稳定在4万/日，但也取决于用户的充值情况\n![](images/img_QWDobxPtdokhGIxUUw2cHczTnLc.png)\n①完成提示词反推skill制作，并将反推提示词JSON序列化化，为增强体验，前端帮客户开发动态卡片，让用户进行快速点选，客户侧skill的交互流程：上传视频 -> 调用VLM反推的skill  -> 反推skill把提示词json 序列好， -> 前端动态页面标签图  -> 用户手工调整标签 -> 新的提示词生成 -> 复制黏贴到LUMI，生成视频；\n协助客户开发的界面示意如下：\n![](images/img_U1oybdI1EounrxxVE3bciRDdnag.png)\n②针对客户提出的画面节奏不对的问题，定向进行优化（拆分镜及BPM提取），效果获得客户认可，已在生产环境中使用；\n<table col-widths=\"242,253,253\">\n    <tr>\n        <td>优化前的skill-节奏过于随机，容易偏慢或偏快<\/td>\n        <td>新视频-定向优化后，解决节奏问题<\/td>\n        <td>新视频-定向优化节奏问题<\/td>\n    <\/tr>\n    <tr>\n        <td><div class=\"video-box\"><video src=\"videos/2026-05-27_10-31-51_ByteArtist.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-05-27_10-31-51_ByteArtist.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/2026-05-26_16-01-53_ByteArtist.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-05-26_16-01-53_ByteArtist.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-01_18-40-23_炉米Lumi_1.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-01_18-40-23_炉米Lumi_1.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n    <\/tr>\n<\/table>\n③下一步协助客户共同制作提示词创作skill，目标通过流水线方式辅助设计师完成符合SD2.0及品牌调性的提示词\n④找到seedream可在客户侧应用的场景。针对生视频场景，和客户共同发现需要提前构建场景图，整个广告片的风格效果一致性能够得到保障，且目前seedream的生成效果可达到客户需求，目前已将经验给到用户，下一步封装到skill中。\n\n- TRAE- 售前 ：①与安踏技术架构部沟通加快TRAE在集团内的推广工作，本周初步选定增加一个品牌的IT作为推广的试点团队，预计下周增加50+个席位；②与安踏AI应用部沟通在内部推广vibe coding的模式，并建议用户测试TRAE-works，客户侧先自己小范围测试TRAE-WORKS。\n\n- 公有云-X万/月-上量中：\n\t- 针对客户新业务系统上线，火山引擎侧进行答疑，当前客户关注点主要集中在Kubernetes 版本能力、负载均衡（针对安全组是否需要放开 0.0.0.0/0”的问题，整理了三种可选方案）、网络安全、消息队列、可观测、安全合规以及企业级服务保障等方面进行答复。下一步配合好客户进行部署、运维的支持类工作。预计增量X万/月\n- VikingDB--新增需求：客户侧在立一个知识库的项目，并在选型原子化能力，和客户介绍VikingDB的能力，并说明Viking在文档解析、embedding、检索以及VLM能力。和客户初步沟通后明确Viking与私部在能力上齐平的前提下，可以考虑SaaS化的方案接入Viking。下周推进客户项目技术负责人针对Viking能力进行测试。\n\n### 楷芯网络：\n\n- 项目运营：\n\t- TRAE-项目售前中：和客户沟通准备线下培训及workshop，楷芯定向邀请软件园企业参加培训，推进TRAE的推广\n\t- seedance2.0：和客户沟通准备线下培训及workshop，楷芯定向邀请电商企业参加培训，推进seedance2.0及LUMI的推广\n\t- 工具包沉淀：火山引擎准备火山引擎产品包及工具的整理，并定期向楷芯网络进行培训与赋能"}, {"id": "thinking", "num": 2, "title": "业务思考", "source": "ai", "content": "1. 这周和国内外多个设计师及内容制作团队共创，主要思考：\n\t1. 提示词从\"内容描述\"更多变成\"生成约束\"。在广告短视频中，影响生成效果的，目前看一方面是需要构建行业的词库，另外一个方面是约束，例如：BGM的重拍落在哪、节奏怎么卡。鞋服行业的提示词，目前看起来本质上不是copy write，而更像是一份压缩过的拍摄执行单，把时序、动作、镜头、节奏这些隐性变量结构化，才能实现效果优化。未来还需要协助客户继续封装到skill中。本周按照这样的方式，跑通若干样本\n\t<table col-widths=\"121,195,204,249\">\n    <tr>\n        <td>示意<\/td>\n        <td>示例一<\/td>\n        <td>示例二<\/td>\n        <td>示例三<\/td>\n    <\/tr>\n    <tr>\n        <td>样片<\/td>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-05_17-22-31_炉米Lumi_1.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-05_17-22-31_炉米Lumi_1.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-05_16-48-41_炉米Lumi.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-05_16-48-41_炉米Lumi.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n        <td><div class=\"video-box\"><video src=\"videos/2026-06-05_15-31-06_炉米Lumi_1.mp4\" controls preload=\"metadata\" style=\"max-width:100%\"><\/video><div class=\"vb-cap\">2026-06-05_15-31-06_炉米Lumi_1.mp4（本地视频 · 点击播放）<\/div><\/div><\/td>\n    <\/tr>\n    <tr>\n        <td>还需优化的点及瑕疵<\/td>\n        <td>较为成功，光晕、卡点、都能还原设计师脑子中的画面感<\/td>\n        <td>1. 还原度较高，细节也能完整展示，但是BGM的生成还存在瑕疵<\/td>\n        <td>1. 动作能够还原设计师想要的效果，服饰搭配上不符合调性，\n2. 启发：需要整理穿搭和调性的约束性组合，调性组合如：\n· 都市通勤通用款：摄影写实 + 暖色调 + 自然光 + 写字楼场景<\/td>\n    <\/tr>\n<\/table>\n\t1. 针对提示词的skill的优化方向。未来的方向除了添加更多的行业约束条件，还可以基于数据驱动分析出什么样的内容更能抛出结果。在分析数据的时候，除了抖店本身的数据外，还块可以结合：素材竞争力、GPM、BGM（分析方法还在探索）。这条链路打通，提示词就不只是创作输入，而会成为连接内容生产、素材测试和投放优化的中间层。我们沉淀的就不是几个好用的 prompt 模板，而是一套能持续逼近业务结果的内容经营方法，这套逻辑还需要持续思考和优化。长期看，这比单纯把生成效果做高半档更有商业壁垒。\n\t2. 小结：视频生成能力，除了模型能力竞争，可以继续向\"提示词的生成约束能力 + 投放反馈闭环能力\"演进。依然还有一个问题，在于如果提示词生成的约束（如行业中的动作词库）做好后全都给到客户，同样会被客户拿走，所以要思考如何能够持续迭代约束条件，这里有两个方向：①找到持续迭代的方法，能够领先客户；②变成一个API，给到客户。"}, {"id": "solution", "num": 3, "title": "解决方案", "source": "ai", "content": "- 鞋服行业AI场景方案：[鞋服行业AI应用场景分析-以安踏为例](https://bytedance.larkoffice.com/wiki/LLI3wOiNIisCwakeW47cwGcZnJb)\n- [安踏LUMI使用情况复盘](https://bytedance.larkoffice.com/wiki/BufqwBmokiOfk9kEn3LcRCjlntf)"}, {"id": "blocker", "num": 4, "title": "问题 & 卡点", "source": "ai", "content": "大模型相关问题：\n<table col-widths=\"137,199,160,121,138,164\">\n    <tr>\n        <td>**模型名称及版本**<\/td>\n        <td>**问题描述**<\/td>\n        <td>**影响客户**<\/td>\n        <td>**金额（MRR）**<\/td>\n        <td>**当前方案及进展**<\/td>\n        <td>**下一步计划**<\/td>\n    <\/tr>\n    <tr>\n ource": "ai", "content": "- 安踏 LUMI + Seedance 2.0 培训复盘报告（撰写中）。\n- 其余解决方案进展待补充。"}, {"id": "blocker", "num": 4, "title": "问题 & 卡点", "source": "ai", "content": "**大模型相关问题：**\n\n| 模型/产品及版本 | 问题描述 | 影响客户 | 金额（MRR） | 当前方案及进展 | 下一步计划 |\n| --- | --- | --- | --- | --- | --- |\n| LUMI / Seedance 2.0 | 去水印承诺函方案被安踏法务拒绝（依据深度合成管理规定须显著标识） | 安踏 | — | 【跟进中】问题已暴露，需另寻合规路径 | 沉淀合规输出机制，统一法务口径 |"}, {"id": "plan", "num": 5, "title": "下周计划", "source": "ai", "content": "- 推进安踏 LUMI + Seedance 2.0 培训复盘报告完成。\n- 其余计划待补充。"}]}]}</script>

<script>
(function(){
  "use strict";
  var LS_KEY="anta_weekly_v3";

  /* ============================================================
     Markdown 渲染器（支持 HTML <table>/<font> 直通 + 图片缩略图）
     ============================================================ */
  function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  function badgeClass(t){
    if(/已完成|已解决|完成/.test(t))return"done";
    if(/复盘中|跟进中|进行中|分析中|售前中|上量/.test(t))return"prog";
    if(/设计中|新增|规划中/.test(t))return"new";
    return"def";
  }

  // 行内 markdown -> HTML（不会接触已被预先抽取的 HTML 占位符）
  function inline(text){
    var s=escapeHtml(text);
    // 图片：![alt](path) -> 缩略图
    s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,function(m,alt,path){
      var safe=path.replace(/"/g,"&quot;");
      var altSafe=(alt||"").replace(/"/g,"&quot;");
      return '<img class="thumb" src="'+safe+'" data-src="'+safe+'" alt="'+altSafe+'" loading="lazy">';
    });
    // 链接：[text](url)
    s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,function(m,t,u){
      return '<a href="'+u.replace(/"/g,"&quot;")+'" target="_blank" rel="noopener">'+t+'</a>';
    });
    // 行内代码
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    // 加粗
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    // 斜体（避免误吞 **）
    s=s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>');
    // 状态徽标 【xxx】
    s=s.replace(/【([^】]{1,10})】/g,function(m,t){return '<span class="badge '+badgeClass(t)+'">'+t+'</span>';});
    // 还原占位符（HTML 直通块/inline 标签 / 单元格内容）
    s=s.replace(/@@HTMLBLK_(\d+)@@/g,function(m,i){return __htmlBlocks[+i]||"";});
    s=s.replace(/@@INLN_(\d+)@@/g,function(m,i){return __inlineTags[+i]||"";});
    return s;
  }

  // 计算行缩进
  function getIndent(l){var m=l.match(/^(\s*)/);return m?m[1].replace(/\t/g,"  ").length:0;}

  // 构建嵌套列表
  function buildList(lines){
    var i=0;
    function parse(minIndent){
      var ordered=/^\s*\d+[.)]\s/.test(lines[i]);
      var indent=getIndent(lines[i]);
      var out=ordered?"<ol>":"<ul>";
      while(i<lines.length){
        var cur=lines[i],ci=getIndent(cur);
        if(ci<minIndent)break;
        if(ci>indent){out=out.replace(/<\/li>$/,"");out+=parse(ci);out+="</li>";continue;}
        var txt=cur.replace(/^\s*([-*]|\d+[.)])\s+/,"");
        out+="<li>"+inline(txt)+"</li>";i++;
      }
      out+=ordered?"</ol>":"</ul>";return out;
    }
    return parse(getIndent(lines[0]));
  }

  // markdown 管道表
  function splitRow(l){return l.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(function(s){return s.trim();});}
  function buildTable(rows){
    var header=splitRow(rows[0]),body=rows.slice(2).map(splitRow);
    var h='<div class="tbl-wrap"><table><thead><tr>';
    header.forEach(function(c){h+="<th>"+inline(c)+"</th>";});
    h+="</tr></thead><tbody>";
    body.forEach(function(r){h+="<tr>";r.forEach(function(c){h+="<td>"+inline(c)+"</td>";});h+="</tr>";});
    h+="</tbody></table></div>";return h;
  }

  // 全局占位符仓库（每次 mdToHtml 调用前清零）
  var __htmlBlocks=[],__inlineTags=[];

  // 处理飞书原生 <table> 单元格：解析单元格内 markdown
  function processFeishuTable(html){
    // 加上 class
    html=html.replace(/<table\b/i,'<table class="feishu-tbl"');
    // 处理每个 <td>（保留属性）
    html=html.replace(/<td([^>]*)>([\s\S]*?)<\/td>/gi,function(m,attrs,content){
      var c=content.replace(/^\s+|\s+$/g,"");
      // 在单元格里：先抽取 <font>、<div class="video-ph">
      c=c.replace(/<font[^>]*>[\s\S]*?<\/font>/gi,function(t){__inlineTags.push(t);return "@@INLN_"+(__inlineTags.length-1)+"@@";});
      c=c.replace(/<div class="video-ph">[\s\S]*?<\/div>/gi,function(t){__inlineTags.push(t);return "@@INLN_"+(__inlineTags.length-1)+"@@";});
      // 其余内容按 markdown 行内处理（先按换行拆分再 join，保留原本换行）
      var lines=c.split(/\n/);
      var processed=lines.map(function(ln){return inline(ln);}).join("<br>");
      return "<td"+attrs+">"+processed+"</td>";
    });
    return html;
  }

  function mdToHtml(md){
    md=(md||"").replace(/\r\n/g,"\n");
    __htmlBlocks=[];__inlineTags=[];

    // 1) 抽取飞书原生 <table>...</table> 块
    md=md.replace(/<table[\s\S]*?<\/table>/gi,function(t){
      __htmlBlocks.push(processFeishuTable(t));
      return "\n@@HTMLBLK_"+(__htmlBlocks.length-1)+"@@\n";
    });
    // 1.b) 抽取 <div class="video-box">...</div>（含 <video> 标签的容器）作为块级直通
    md=md.replace(/<div class="video-box"[\s\S]*?<\/div>/gi,function(t){
      __htmlBlocks.push(t);
      return "\n@@HTMLBLK_"+(__htmlBlocks.length-1)+"@@\n";
    });
    // 1.c) 抽取裸 <video>...</video> 块（兜底，没有外包 div 时也直通）
    md=md.replace(/<video[\s\S]*?<\/video>/gi,function(t){
      __htmlBlocks.push('<div class="video-box">'+t+'</div>');
      return "\n@@HTMLBLK_"+(__htmlBlocks.length-1)+"@@\n";
    });
    // 2) 抽取 inline 的 <font ...>...</font>（飞书背景色等）
    md=md.replace(/<font[^>]*>[\s\S]*?<\/font>/gi,function(t){
      __inlineTags.push(t);
      return "@@INLN_"+(__inlineTags.length-1)+"@@";
    });
    // 3) 抽取视频占位符 <div class="video-ph">...</div>
    md=md.replace(/<div class="video-ph">[\s\S]*?<\/div>/gi,function(t){
      __inlineTags.push(t);
      return "@@INLN_"+(__inlineTags.length-1)+"@@";
    });

    var lines=md.split("\n"),html="",i=0;
    function isList(l){return /^\s*([-*]|\d+[.)])\s+/.test(l);}
    function isTbl(l){return /^\s*\|.*\|\s*$/.test(l);}
    function isSep(l){return /^\s*\|?[\s:|-]+\|?\s*$/.test(l)&&/-/.test(l);}
    function isHtmlBlockPlaceholder(l){return /^@@HTMLBLK_\d+@@$/.test(l.trim());}

    while(i<lines.length){
      var line=lines[i];
      if(/^\s*$/.test(line)){i++;continue;}
      // 整行 = HTML 块占位符
      if(isHtmlBlockPlaceholder(line)){
        var idx=parseInt(line.trim().match(/_(\d+)@@/)[1],10);
        html+=(__htmlBlocks[idx]||"");
        i++;continue;
      }
      // 标题
      var hm=line.match(/^(#{2,6})\s+(.*)$/);
      if(hm){var lv=Math.min(hm[1].length,4);html+="<h"+lv+">"+inline(hm[2])+"</h"+lv+">";i++;continue;}
      // 分隔线
      if(/^\s*(---|\*\*\*)\s*$/.test(line)){html+="<hr>";i++;continue;}
      // markdown 管道表
      if(isTbl(line)&&i+1<lines.length&&isSep(lines[i+1])){
        var tr=[];while(i<lines.length&&isTbl(lines[i])){tr.push(lines[i]);i++;}html+=buildTable(tr);continue;
      }
      // 引用
      if(/^\s*>\s?/.test(line)){
        var q=[];while(i<lines.length&&/^\s*>\s?/.test(lines[i])){q.push(lines[i].replace(/^\s*>\s?/,""));i++;}
        html+="<blockquote>"+q.map(inline).join("<br>")+"</blockquote>";continue;
      }
      // 列表（含嵌套）
      if(isList(line)){
        var ll=[];
        while(i<lines.length&&!/^\s*$/.test(lines[i])&&(isList(lines[i])||(/^\s+\S/.test(lines[i])&&ll.length))){
          if(isHtmlBlockPlaceholder(lines[i]))break;
          ll.push(lines[i]);i++;
        }
        html+=buildList(ll);continue;
      }
      // 段落
      var p=[];
      while(i<lines.length
            && !/^\s*$/.test(lines[i])
            && !isList(lines[i])
            && !/^(#{2,6})\s/.test(lines[i])
            && !isTbl(lines[i])
            && !/^\s*>\s?/.test(lines[i])
            && !isHtmlBlockPlaceholder(lines[i])){
        p.push(lines[i]);i++;
      }
      html+="<p>"+p.map(inline).join("<br>")+"</p>";
    }
    return html;
  }

  /* ---------- 数据加载 ---------- */
  var DEFAULT_DATA=JSON.parse(document.getElementById("default-data").textContent);
  var data=null,curIdx=0;
  function deepClone(o){return JSON.parse(JSON.stringify(o));}
  function loadData(cb){
    try{var saved=localStorage.getItem(LS_KEY);if(saved){data=JSON.parse(saved);return cb();}}catch(e){}
    if(location.protocol==="http:"||location.protocol==="https:"){
      fetch("./data.json",{cache:"no-store"}).then(function(r){if(!r.ok)throw 0;return r.json();})
        .then(function(j){data=j;cb();}).catch(function(){data=deepClone(DEFAULT_DATA);cb();});
    }else{data=deepClone(DEFAULT_DATA);cb();}
  }
  function persist(){
    data.meta.updatedAt=new Date().toISOString().slice(0,10);
    try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}
    renderMeta();
    renderActiveWeekTitle();
  }

  function renderActiveWeekTitle(withMotion){
    if(!data||!data.weeks||!data.weeks.length)return;
    var w=data.weeks[curIdx];
    var el=document.getElementById("active-week-title");
    if(!el||!w)return;
    var text=w.label+" · "+w.range;
    if(w.rangeFull)text+="（"+w.rangeFull+"）";
    if(withMotion){
      el.classList.add("updating");
      window.setTimeout(function(){el.textContent=text;el.classList.remove("updating");},120);
    }else{
      el.textContent=text;
    }
  }

  /* ---------- Toast + 复制 + AI 弹窗 ---------- */
  var toastEl=document.getElementById("toast"),toastTimer=null;
  function toast(msg,ms){toastEl.innerHTML=msg;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(function(){toastEl.classList.remove("show");},ms||3000);}
  function copyText(txt){
    if(navigator.clipboard&&window.isSecureContext){return navigator.clipboard.writeText(txt);}
    return new Promise(function(res,rej){try{var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);res();}catch(e){rej(e);}});
  }
  var aiModal=document.getElementById("ai-modal"),aiModalText=document.getElementById("ai-modal-text");
  function openAiModal(payload){
    aiModalText.value=payload;
    aiModal.classList.add("show");
    copyText(payload).catch(function(){});
  }
  document.getElementById("ai-modal-close").addEventListener("click",function(){aiModal.classList.remove("show");});
  document.getElementById("ai-modal-copy").addEventListener("click",function(){copyText(aiModalText.value).then(function(){toast("📋 已再次复制到剪贴板");}).catch(function(){aiModalText.focus();aiModalText.select();});});
  aiModal.addEventListener("click",function(e){if(e.target===aiModal)aiModal.classList.remove("show");});

  /* ---------- Lightbox 大图 ---------- */
  var lbEl=document.getElementById("lightbox"),lbImg=document.getElementById("lb-img"),lbClose=document.getElementById("lb-close");
  function openLightbox(src,alt){
    lbImg.src=src;lbImg.alt=alt||"";
    lbEl.classList.add("show");
    document.body.style.overflow="hidden";
  }
  function closeLightbox(){
    lbEl.classList.remove("show");
    lbImg.src="";
    document.body.style.overflow="";
  }
  lbClose.addEventListener("click",function(e){e.stopPropagation();closeLightbox();});
  lbEl.addEventListener("click",function(e){
    // 点击图片本身不关；点击其它（mask）关闭
    if(e.target===lbImg)return;
    closeLightbox();
  });
  document.addEventListener("keydown",function(e){if(e.key==="Escape"&&lbEl.classList.contains("show"))closeLightbox();});
  // 全局事件委托：点缩略图弹大图
  document.addEventListener("click",function(e){
    var t=e.target;
    if(t&&t.classList&&t.classList.contains("thumb")){
      e.preventDefault();
      var src=t.getAttribute("data-src")||t.getAttribute("src");
      if(src)openLightbox(src,t.alt);
    }
  });

  /* ---------- 渲染：meta ---------- */
  function renderMeta(){
    document.getElementById("doc-title").textContent=data.meta.title;
    document.getElementById("doc-meta").innerHTML=
      "<span>负责人：<b>"+data.meta.owner+"</b></span><span>团队：<b>"+data.meta.team+"</b></span>"+
      "<span>业务方向：<b>"+data.meta.direction+"</b></span><span>更新时间：<b>"+data.meta.updatedAt+"</b></span>";
    document.getElementById("footer-text").innerHTML=
      data.meta.title+'<span class="sep">|</span>负责人：'+data.meta.owner+
      '<span class="sep">|</span>周定义：'+(data.meta.weekDef||"自然周")+'<span class="sep">|</span>最近更新：'+data.meta.updatedAt;
  }

  /* ---------- 渲染：可编辑模块 ---------- */
  function buildModule(fieldObj,opts){
    var mod=document.createElement("div");mod.className="module";
    var srcTxt=fieldObj.source==="ai"?"AI":"手动";
    var numHtml=opts.num?'<span class="num">'+opts.num+'</span>':'';
    mod.innerHTML=
      '<div class="module-head"><div class="module-title">'+numHtml+'<span>'+opts.title+'</span>'+
      '<span class="src-badge '+(fieldObj.source==="ai"?"ai":"manual")+'">'+srcTxt+'</span></div>'+
      '<button class="btn-edit">✏️ 编辑</button></div>'+
      (opts.hint?'<div class="module-hint">'+opts.hint+'</div>':'')+
      '<div class="module-view md"></div>'+
      '<div class="module-edit" hidden><textarea spellcheck="false"></textarea>'+
        '<div class="edit-tip">支持 Markdown：**加粗**、列表 <code>- </code>、链接 <code>[文字](链接)</code>、表格 <code>| 列 |</code>、引用 <code>&gt; </code>、状态徽标 <code>【已完成】</code>、图片 <code>![](images/xxx.png)</code>、飞书原生 <code>&lt;table&gt;</code> 直通</div>'+
        '<div class="edit-actions"><button class="ebtn ai">✨ AI 润色</button><button class="ebtn save">💾 保存</button><button class="ebtn cancel">取消</button></div>'+
      '</div>';
    var view=mod.querySelector(".module-view"),editBox=mod.querySelector(".module-edit"),ta=mod.querySelector("textarea"),btnEdit=mod.querySelector(".btn-edit"),srcEl=mod.querySelector(".src-badge");
    function renderView(){
      var c=(fieldObj.content||"").trim();
      if(c==="待补充"){view.innerHTML='<span class="todo-flag">⏳ 待补充</span>';}
      else{view.innerHTML=mdToHtml(fieldObj.content);}
    }
    renderView();
    function enterEdit(){ta.value=fieldObj.content;mod.classList.add("editing");view.hidden=true;editBox.hidden=false;btnEdit.hidden=true;ta.style.height="auto";ta.style.height=Math.max(200,ta.scrollHeight+8)+"px";ta.focus();}
    function exitEdit(){mod.classList.remove("editing");view.hidden=false;editBox.hidden=true;btnEdit.hidden=false;}
    btnEdit.addEventListener("click",enterEdit);
    mod.querySelector(".cancel").addEventListener("click",exitEdit);
    ta.addEventListener("input",function(){ta.style.height="auto";ta.style.height=(ta.scrollHeight+8)+"px";});
    mod.querySelector(".save").addEventListener("click",function(){
      fieldObj.content=ta.value;fieldObj.source="manual";
      srcEl.className="src-badge manual";srcEl.textContent="手动";
      renderView();persist();exitEdit();toast("✅ 已保存到本地，并标记为「手动」内容");
    });
    mod.querySelector(".ai").addEventListener("click",function(){
      var payload="【请帮我润色以下周报内容，保留原意与所有链接，改好后直接更新】\n周次："+(opts.weekLabel||"")+"\n模块："+opts.title+"\n\n"+ta.value;
      openAiModal(payload);
    });
    return mod;
  }

  /* ---------- 渲染：背景卡 ---------- */
  function renderBackground(){
    var body=document.getElementById("bg-body");body.innerHTML="";
    body.appendChild(buildModule(data.background.summary,{num:0,title:"业务概览",hint:"",weekLabel:"背景信息"}));
    var lab=document.createElement("div");lab.className="lab";lab.textContent="本阶段安踏相关重要文档（点击直达，保持溯源）";body.appendChild(lab);
    var chips=document.createElement("div");chips.className="doc-chips";
    data.background.docs.forEach(function(d){var a=document.createElement("a");a.className="doc-link";a.href=d.url;a.target="_blank";a.rel="noopener";a.textContent=d.title;chips.appendChild(a);});
    body.appendChild(chips);
  }

  /* ---------- 渲染：侧边导航（事件委托更稳健） ---------- */
  function renderSidebar(){
    var list=document.getElementById("side-list");list.innerHTML="";
    data.weeks.forEach(function(w,idx){
      var allTodo=w.sections.every(function(s){return (s.content||"").trim()==="待补充";});
      var it=document.createElement("div");
      it.className="side-item"+(idx===curIdx?" active":"");
      it.setAttribute("data-idx",String(idx));
      it.setAttribute("data-week-id",w.id);
      it.innerHTML='<div class="si-range">'+w.range+(w.current?' <span class="si-cur">本周</span>':'')+(allTodo?' <span class="si-todo">待补充</span>':'')+'</div>'+
                   '<div class="si-label">'+w.label+'</div>';
      list.appendChild(it);
    });
    document.getElementById("side-foot").textContent="共 "+data.weeks.length+" 周 · 自然周归档";
  }

  // 仅绑定一次：事件委托到 document.body（任何祖先元素重渲染都不会丢失）
  // 通过 closest('.side-item') 直接找到目标，避免依赖中间容器存活
  document.body.addEventListener("click",function(e){
    var t=e.target;
    if(!t||!t.closest)return;
    if(document.body.classList.contains("mobile-nav-open")&&t===document.body){document.body.classList.remove("mobile-nav-open");return;}
    var item=t.closest(".side-item");
    if(!item)return;
    var idxStr=item.getAttribute("data-idx");
    if(idxStr===null)return;
    var idx=parseInt(idxStr,10);
    if(isNaN(idx)||!data||!data.weeks||idx<0||idx>=data.weeks.length)return;
    if(idx===curIdx){
      window.scrollTo({top:0,behavior:"smooth"});
      return;
    }
    curIdx=idx;
    switchWeek();
    renderSidebar();
    if(window.matchMedia("(max-width: 767px)").matches){document.body.classList.remove("mobile-nav-open");}
    window.scrollTo({top:0,behavior:"smooth"});
  });

  /* ---------- 渲染：当前周 ---------- */
  function renderWeek(){
    var w=data.weeks[curIdx],host=document.getElementById("week");
    renderActiveWeekTitle();
    var noteHtml=w.note&&w.note.content?mdToHtml(w.note.content).replace(/^<p>|<\/p>$/g,""):"";
    host.innerHTML='<div class="week-head"><span class="range">'+w.range+'</span>'+ 
      '<span class="label">'+w.label+'</span>'+(w.rangeFull?'<span class="full">'+w.rangeFull+'</span>':'')+
      (w.current?'<span class="badge">本周</span>':'<span class="badge hist">历史周</span>')+'</div>'+ 
      (noteHtml?'<div class="week-note">'+noteHtml+'</div>':'');
    w.sections.forEach(function(sec){
      host.appendChild(buildModule(sec,{num:sec.num,title:sec.title,hint:(data.hints&&data.hints[sec.id])||"",weekLabel:w.label+"（"+w.range+"）"}));
    });
  }

  function switchWeek(){
    var host=document.getElementById("week");
    host.classList.add("switching");
    renderActiveWeekTitle(true);
    window.setTimeout(function(){
      renderWeek();
      requestAnimationFrame(function(){host.classList.remove("switching");});
    },180);
  }

  /* ---------- 工具栏 / 折叠 ---------- */
  document.getElementById("navToggle").addEventListener("click",function(){
    if(window.matchMedia("(max-width: 767px)").matches){document.body.classList.toggle("mobile-nav-open");}
    else{document.body.classList.toggle("nav-collapsed");}
  });
  document.getElementById("btn-download").addEventListener("click",function(){
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="data.json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    toast("⬇️ 已导出 data.json，可替换原文件以持久化保存");
  });
  document.getElementById("btn-reset").addEventListener("click",function(){
    if(confirm("确定要清除本地的所有编辑修改、恢复到初始内容吗？")){try{localStorage.removeItem(LS_KEY);}catch(e){}location.reload();}
  });

  /* ---------- 启动 ---------- */
  loadData(function(){
    // 初始默认显示「本周」（current=true 的那条）；若没找到则显示第一条
    curIdx=Math.max(0,data.weeks.findIndex(function(w){return w.current;}));
    if(curIdx<0)curIdx=0;
    renderMeta();renderBackground();renderSidebar();renderWeek();
  });
})();
</script>
</body>
</html>
